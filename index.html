function Dashboard() {
  const [todos, setTodos] = useState(initialTodos);
  const [newTodo, setNewTodo] = useState("");
  const [newTag, setNewTag] = useState("Privat");
  const [activeFilter, setActiveFilter] = useState("Alle");
  const [expandedNote, setExpandedNote] = useState(null);
  const [menuOpen, setMenuOpen] = useState(false);
  const time = new Date().toLocaleDateString("de-DE",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});

  const toggleTodo = (id) => setTodos(todos.map(t=>t.id===id?{...t,done:!t.done}:t));
  const deleteTodo = (id) => setTodos(todos.filter(t=>t.id!==id));
  const addTodo = () => {
    if (!newTodo.trim()) return;
    setTodos([...todos,{id:Date.now(),text:newTodo,done:false,tag:newTag}]);
    setNewTodo("");
  };

  const tags = ["Alle",...Object.keys(tagColors)];
  const filtered = activeFilter==="Alle" ? todos : todos.filter(t=>t.tag===activeFilter);
  const done = todos.filter(t=>t.done).length;
  const progress = todos.length ? Math.round((done/todos.length)*100) : 0;

  const knowledgeCards = [
    {title:"iCloud Speicher",emoji:"☁️",body:"Fotos & 'Zuletzt gelöscht' → iPhone-Backups → Nachrichten-Anhänge → iCloud Drive.\nZiel: unter 80 % Auslastung."},

        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:'1.25rem'}}>

        {/* To-Dos */}
        <div style={card}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'0.75rem'}}>
            <h2 style={{color:'#2c5f6e',fontWeight:700,fontSize:'1.05rem'}}>✅ To-Dos</h2>
            <span style={{color:'#7a9eaa',fontSize:'0.8rem'}}>{done}/{todos.length} erledigt</span>
          </div>
          <div style={{background:'rgba(44,95,110,0.1)',borderRadius:'9999px',height:'8px',marginBottom:'0.75rem'}}>
            <div style={{background:'linear-gradient(90deg,#5bbfd4,#78c87a)',height:'8px',borderRadius:'9999px',width:`${progress}%`,transition:'width 0.5s'}} />
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:'0.4rem',marginBottom:'0.75rem'}}>
            {tags.map(tag=>(
              <button key={tag} onClick={()=>setActiveFilter(tag)}
                style={{fontSize:'0.72rem',padding:'0.2rem 0.7rem',borderRadius:'9999px',border:'1px solid',cursor:'pointer',fontFamily:'Rubik,sans-serif',
                  background:activeFilter===tag?'#2c5f6e':'transparent',
                  color:activeFilter===tag?'#fff':'#7a9eaa',
                  borderColor:activeFilter===tag?'#2c5f6e':'#b8dde8'}}>{tag}</button>
            ))}
          </div>
          <div style={{maxHeight:'300px',overflowY:'auto',display:'flex',flexDirection:'column',gap:'0.4rem',marginBottom:'0.75rem'}}>
            {filtered.map(todo=>(
              <div key={todo.id} style={{display:'flex',alignItems:'center',gap:'0.6rem',
                background:'rgba(255,255,255,0.55)',border:'1px solid rgba(255,255,255,0.75)',borderRadius:'0.75rem',padding:'0.55rem 0.9rem'}}>
                <input type="checkbox" checked={todo.done} onChange={()=>toggleTodo(todo.id)}
                  style={{accentColor:'#5bbfd4',width:'16px',height:'16px',cursor:'pointer',flexShrink:0}} />
                <span style={{flex:1,fontSize:'0.85rem',color:todo.done?'#aac8d0':'#2c5f6e',textDecoration:todo.done?'line-through':'none'}}>{todo.text}</span>
                <span style={{fontSize:'0.7rem',padding:'0.1rem 0.5rem',borderRadius:'9999px',flexShrink:0,
                  background:tagColors[todo.tag]?.bg||'#eee',color:tagColors[todo.tag]?.color||'#555'}}>{todo.tag}</span>
                <button onClick={()=>deleteTodo(todo.id)}
                  style={{color:'#e07070',background:'none',border:'none',cursor:'pointer',fontSize:'0.8rem',flexShrink:0}}>✕</button>
              </div>
            ))}
          </div>
          <div style={{display:'flex',gap:'0.5rem'}}>
            <input type="text" value={newTodo} onChange={e=>setNewTodo(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&addTodo()} placeholder="Neue Aufgabe..."
              style={{flex:1,borderRadius:'0.75rem',padding:'0.5rem 0.9rem',fontSize:'0.85rem',fontFamily:'Rubik,sans-serif',
                border:'1px solid #b8dde8',background:'rgba(255,255,255,0.7)',color:'#2c5f6e',outline:'none'}} />
            <select value={newTag} onChange={e=>setNewTag(e.target.value)}
              style={{borderRadius:'0.75rem',padding:'0.5rem 0.6rem',fontSize:'0.85rem',fontFamily:'Rubik,sans-serif',
                border:'1px solid #b8dde8',background:'rgba(255,255,255,0.7)',color:'#2c5f6e',outline:'none'}}>
              {Object.keys(tagColors).map(t=><option key={t}>{t}</option>)}
            </select>
            <button onClick={addTodo}
              style={{background:'linear-gradient(135deg,#5bbfd4,#78c87a)',color:'#fff',border:'none',fontFamily:'Rubik,sans-serif',
                borderRadius:'0.75rem',padding:'0.5rem 1rem',fontWeight:700,cursor:'pointer',fontSize:'1rem'}}>+</button>
          </div>
        </div>

        {/* Right column */}
        <div style={{display:'flex',flexDirection:'column',gap:'1.25rem'}}>
          <div style={card}>
            <h2 style={{color:'#2c5f6e',fontWeight:700,fontSize:'1.05rem',marginBottom:'0.75rem'}}>🔗 Quick Links</h2>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.5rem'}}>
              {quickLinks.map(link=>(
                <a key={link.label} href={link.url} target="_blank" rel="noreferrer"
                  style={{display:'flex',alignItems:'center',gap:'0.4rem',
                    background:'rgba(91,191,212,0.12)',border:'1px solid rgba(91,191,212,0.25)',
                    borderRadius:'0.75rem',padding:'0.55rem 0.7rem',fontSize:'0.82rem',color:'#2c5f6e'}}>
                  <span>{link.emoji}</span><span>{link.label}</span>
                </a>
              ))}
            </div>
          </div>
          <div style={card}>
            <h2 style={{color:'#2c5f6e',fontWeight:700,fontSize:'1.05rem',marginBottom:'0.75rem'}}>📊 Status</h2>
            {Object.keys(tagColors).map(tag=>{
              const count=todos.filter(t=>t.tag===tag).length;
              const doneCount=todos.filter(t=>t.tag===tag&&t.done).length;
              return (
                <div key={tag} style={{marginBottom:'0.6rem'}}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:'0.75rem',color:'#7a9eaa',marginBottom:'0.2rem'}}>
                    <span>{tag}</span><span>{doneCount}/{count}</span>
                  </div>
                  <div style={{background:'rgba(44,95,110,0.1)',borderRadius:'9999px',height:'6px'}}>
                    <div style={{background:'linear-gradient(90deg,#5bbfd4,#78c87a)',height:'6px',borderRadius:'9999px',
                      width:count>0?`${Math.round((doneCount/count)*100)}%`:'0%',transition:'width 0.5s'}} />
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Knowledge Cards */}
        <div style={{...card,gridColumn:'1/-1'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'0.75rem'}}>
            <h2 style={{color:'#2c5f6e',fontWeight:700,fontSize:'1.05rem'}}>📝 Schnellwissen</h2>
            <span style={{fontSize:'0.75rem',color:'#7a9eaa'}}>☰ Vollständiges Wissen im Menü</span>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'0.75rem'}}>
            {knowledgeCards.map((note,i)=>(
              <div key={i} onClick={()=>setExpandedNote(expandedNote===i?null:i)}
                style={{background:'rgba(91,191,212,0.08)',border:'1px solid rgba(91,191,212,0.25)',
                  borderRadius:'0.75rem',padding:'0.85rem',cursor:'pointer'}}>
                <div style={{display:'flex',alignItems:'center',gap:'0.5rem',marginBottom:'0.3rem'}}>
                  <span style={{fontSize:'1.2rem'}}>{note.emoji}</span>
                  <span style={{fontWeight:700,fontSize:'0.88rem',color:'#2c5f6e'}}>{note.title}</span>
                </div>
                {expandedNote===i
                  ? <pre style={{color:'#5a8090',fontSize:'0.78rem',lineHeight:1.6,margin:0,whiteSpace:'pre-wrap',fontFamily:'Rubik,sans-serif',borderTop:'1px solid rgba(91,191,212,0.3)',paddingTop:'0.5rem'}}>{note.body}</pre>
                  : <p style={{color:'#aac8d0',fontSize:'0.75rem',margin:0}}>Klicken zum Öffnen →</p>
                }
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
</script>
</body>
</html>
